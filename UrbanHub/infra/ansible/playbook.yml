- name: Deployer le backend UrbanHub
  hosts: backend
  become: true
  vars:
    aws_region: eu-west-3
    ecr_repository_url: "CHANGE_ME"      # terraform output ecr_repository_url
    image_tag: latest
    db_password_secret_id: "CHANGE_ME"   # terraform output db_password_secret_arn
    rds_endpoint: "CHANGE_ME"            # terraform output rds_endpoint
    db_name: urbanhub
    db_username: urbanhub
  roles:
    - docker
    - app_deploy
