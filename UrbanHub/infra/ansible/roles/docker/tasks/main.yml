- name: Installer Docker (paquet dnf Amazon Linux 2023)
  ansible.builtin.dnf:
    name: docker
    state: present

- name: Demarrer et activer le service Docker
  ansible.builtin.systemd:
    name: docker
    enabled: true
    state: started

- name: Ajouter ssm-user au groupe docker
  ansible.builtin.user:
    name: ssm-user
    groups: docker
    append: true

- name: Creer le repertoire des plugins CLI Docker
  ansible.builtin.file:
    path: /usr/libexec/docker/cli-plugins
    state: directory
    mode: "0755"

- name: Installer le plugin Docker Compose v2
  ansible.builtin.get_url:
    url: https://github.com/docker/compose/releases/download/v2.29.7/docker-compose-linux-x86_64
    dest: /usr/libexec/docker/cli-plugins/docker-compose
    mode: "0755"
