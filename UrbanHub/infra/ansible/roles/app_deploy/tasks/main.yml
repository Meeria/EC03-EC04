- name: Recuperer le mot de passe RDS depuis Secrets Manager
  ansible.builtin.command:
    cmd: >
      aws secretsmanager get-secret-value
      --secret-id "{{ db_password_secret_id }}"
      --query "SecretString"
      --output text
      --region "{{ aws_region }}"
  delegate_to: localhost
  become: false
  changed_when: false
  no_log: true
  register: secrets_manager_db_password

- name: Memoriser le mot de passe pour le template .env
  ansible.builtin.set_fact:
    db_password: "{{ secrets_manager_db_password.stdout }}"
  no_log: true

- name: Recuperer un jeton d'authentification ECR
  ansible.builtin.command:
    cmd: "aws ecr get-login-password --region {{ aws_region }}"
  delegate_to: localhost
  become: false
  changed_when: false
  no_log: true
  register: ecr_password

- name: Connexion Docker au registre ECR depuis le serveur
  community.docker.docker_login:
    registry_url: "{{ ecr_repository_url.split('/')[0] }}"
    username: AWS
    password: "{{ ecr_password.stdout }}"
  no_log: true

- name: Creer le repertoire de deploiement
  ansible.builtin.file:
    path: /opt/urbanhub
    state: directory
    mode: "0755"

- name: Deployer le fichier .env (secrets)
  ansible.builtin.template:
    src: env.j2
    dest: /opt/urbanhub/.env
    mode: "0600"
  no_log: true

- name: Deployer le docker-compose.yml de production
  ansible.builtin.template:
    src: docker-compose.prod.yml.j2
    dest: /opt/urbanhub/docker-compose.yml
    mode: "0644"

- name: Demarrer le backend (docker compose up -d)
  ansible.builtin.command:
    cmd: docker compose up -d
    chdir: /opt/urbanhub
