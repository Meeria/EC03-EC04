spring.datasource.url=jdbc:postgresql://db:5432/urbanhub
spring.datasource.username=urbanhub
spring.datasource.password=urbanhub
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=600000

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# MQTT
mqtt.enabled=${MQTT_ENABLED:true}
mqtt.broker.url=${MQTT_BROKER_URL:tcp://localhost:1883}
mqtt.client.id=${MQTT_CLIENT_ID:urbanhub-backend}
mqtt.topic=${MQTT_TOPIC:urbanhub/sensors/#}
