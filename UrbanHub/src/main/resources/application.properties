spring.application.name=UrbanHub

# spring.datasource.url=jdbc:postgresql://149.202.77.193:7819/urbanhub
spring.datasource.url=jdbc:postgresql://localhost:5432/urbanhub
spring.datasource.username=urbanhub
spring.datasource.password=urbanhub
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=600000

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.hibernate.ddl-auto=update

# Désactivé par défaut : avec l'ingestion MQTT, chaque mesure = plusieurs requêtes → console illisible.
# Pour déboguer le SQL ponctuellement : true ici, ou logging.level.org.hibernate.SQL=DEBUG
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.generate_statistics=false

# Logging levels (can be overridden by profiles)
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN
logging.level.org.eclipse.paho=WARN
logging.level.com.zaxxer.hikari=WARN
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# MQTT
mqtt.enabled=${MQTT_ENABLED:true}
mqtt.broker.url=${MQTT_BROKER_URL:tcp://localhost:1883}
mqtt.client.id=${MQTT_CLIENT_ID:urbanhub-backend}
mqtt.topic=${MQTT_TOPIC:urbanhub/sensors/#}
