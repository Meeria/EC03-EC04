name: CI/CD

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
    types: [opened, synchronize, reopened, ready_for_review]

# build le projet java avec gradle
jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: UrbanHub
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - name: Build
        run: ./gradlew assemble --no-daemon

# Execute les tests du backend avec jacoco et upload le rapport
  test:
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: UrbanHub
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - name: Test
        run: ./gradlew test jacocoTestReport --no-daemon
      - name: Upload Jacoco report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: UrbanHub/build/reports/jacoco/test

# Mock sonarqube
  quality:   
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Quality check (placeholder, pas d'analyse reelle)
        run: echo "Quality gate ok (mock)"


# scan de vulnerabilites (dependances + filesystem) avec Trivy
  security:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      security-events: write # requis pour publier le SARIF dans l'onglet Security
    steps:
      - uses: actions/checkout@v4

      - name: Trivy (rapport complet, non bloquant)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: "."
          format: sarif
          output: trivy-results.sarif
          severity: "CRITICAL,HIGH"
          exit-code: "0"

      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy-fs

      - name: Trivy (gate bloquant sur CRITICAL)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: "."
          severity: "CRITICAL"
          exit-code: "1"

# build l'image et la pousse sur ECR
  docker:
    runs-on: ubuntu-latest
    needs: [quality, security]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-3
      - name: Login to ECR
        id: ecr_login
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build and push image
        working-directory: UrbanHub
        env:
          ECR_REGISTRY: ${{ steps.ecr_login.outputs.registry }}
        run: |
          IMAGE="$ECR_REGISTRY/urbanhub-backend:${{ github.sha }}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"

# redemarre le backend sur l'EC2 via SSM/Ansible avec la nouvelle image
  deploy:
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-3
      - name: Install session-manager-plugin
        run: |
          curl -s "https://s3.amazonaws.com/session-manager-downloads/plugin/latest/ubuntu_64bit/session-manager-plugin.deb" -o session-manager-plugin.deb
          sudo dpkg -i session-manager-plugin.deb
      - name: Install Ansible and collections
        run: |
          pip install --user ansible boto3 botocore
          ansible-galaxy collection install community.docker
      - name: Generate inventory.ini
        working-directory: UrbanHub/infra/ansible
        run: |
          sed -e "s#<INSTANCE_ID>#${{ vars.INSTANCE_ID }}#" \
              -e "s#<SSM_TRANSFER_BUCKET>#${{ vars.SSM_TRANSFER_BUCKET }}#" \
              inventory.ini.tmpl > inventory.ini
      - name: Deploy via Ansible
        working-directory: UrbanHub/infra/ansible
        run: ansible-playbook playbook.yml --extra-vars "image_tag=${{ github.sha }}"

