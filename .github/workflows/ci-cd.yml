name: CI/CD

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

# build le projet java avec gradle
jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: UrbanHub
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - name: Build
        run: ./gradlew assemble --no-daemon

# Execute les tests du backend avec jacoco et upload le rapport
  test:
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: UrbanHub
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - name: Test
        run: ./gradlew test jacocoTestReport --no-daemon
      - name: Upload Jacoco report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: UrbanHub/build/reports/jacoco/test

# Mock sonarqube
  quality:   
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Quality check (placeholder, pas d'analyse reelle)
        run: echo "Quality gate ok (mock)"


# build l'image et la pousse sur ECR
  docker:
    runs-on: ubuntu-latest
    needs: quality
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-3
      - name: Login to ECR
        id: ecr_login
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build and push image
        working-directory: UrbanHub
        env:
          ECR_REGISTRY: ${{ steps.ecr_login.outputs.registry }}
        run: |
          IMAGE="$ECR_REGISTRY/urbanhub-backend:${{ github.sha }}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
